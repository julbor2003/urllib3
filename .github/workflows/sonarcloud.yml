name: SonarCloud analysis
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies (use uv to sync dev group)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install uv
          uv sync --group dev --frozen
          python -m pip install coverage pytest trustme trio quart quart-trio httpx h2 pysocks cryptography pyOpenSSL idna pytest-socket pytest-timeout
          python -m pip install 'anyio[trio]'
      - name: Diagnostic: print installed packages and versions
        run: |
          python -m pip freeze | sed -n '1,200p'
          python - <<'PY'
import importlib, sys
names = ["hypercorn","quart","quart_trio","trio","anyio","httpx"]
for n in names:
    try:
        m = importlib.import_module(n)
        print(n, getattr(m, "__version__", "(no __version__)") , m.__file__)
    except Exception as e:
        print(n, "MISSING/ERROR:", e)
PY
      - name: Run unit tests and generate coverage report
        run: |
          mkdir -p .coverage-reports
          python -m coverage run -m pytest test
          python -m coverage xml -o .coverage-reports/coverage-python.xml
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=julbor2003_urllib3
            -Dsonar.organization=julbor2003
            -Dsonar.python.coverage.reportPaths=.coverage-reports/coverage-python.xml
            -Dsonar.qualitygate.wait=true
